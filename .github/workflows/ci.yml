name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  merge-gate:
    name: Lint, Test, Build, and Pack
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install bd CLI
        run: npm install -g @beads/bd

      - name: Verify bd compatibility
        shell: bash
        run: |
          help_output="$(bd init --help 2>&1)"
          case "$help_output" in
            *--shared-server* ) : ;;
            * )
              echo "$help_output"
              echo "Missing required bd init flag: --shared-server"
              exit 1
              ;;
          esac
          case "$help_output" in
            *--skip-agents* ) : ;;
            * )
              echo "$help_output"
              echo "Missing required bd init flag: --skip-agents"
              exit 1
              ;;
          esac

      - name: Run mock-run seeder coverage
        run: npm run test -- tests/unit/mock-run/bd-support.test.ts tests/integration/mock-run/seed-mock-run.test.ts

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Run builds
        run: npm run build

      - name: Verify package contents
        shell: bash
        run: |
          npm pack --json --dry-run --ignore-scripts > pack-output.json
          node -e "const fs = require('node:fs'); const raw = fs.readFileSync('pack-output.json', 'utf8').replace(/^\\uFEFF/, ''); const info = JSON.parse(raw)[0]; const files = new Set(info.files.map((file) => file.path)); for (const required of ['dist/index.js', 'olympus/dist/index.html']) { if (!files.has(required)) { console.error('Missing packaged file: ' + required); process.exit(1); } }"
